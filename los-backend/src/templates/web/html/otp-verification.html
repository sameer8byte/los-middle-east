<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OTP Verification</title>
  <style>
    body {
      background-color: #f5f5f5;
      font-family: "Segoe UI", "Roboto", "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: #111;
    }

    .container {
      max-width: 480px;
      margin: 40px auto;
      background-color: #ffffff;
      border-radius: 10px;
      padding: 36px 28px;
      border: 1px solid #e5e5e5;
      box-sizing: border-box;
    }

    .brand {
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      color: #000;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    .message {
      font-size: 15px;
      text-align: center;
      line-height: 1.6;
      color: #333;
      margin-bottom: 28px;
    }

    .otp-wrapper {
      text-align: center;
      margin-bottom: 24px;
    }

    .otp-box {
      display: inline-block;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 8px;
      color: #000;
      background: #fafafa;
      padding: 12px 24px;
      border-radius: 8px;
      border: 1px solid #e5e5e5;
    }

    .note {
      font-size: 13px;
      text-align: center;
      color: #555;
      line-height: 1.6;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-top: 32px;
      border-top: 1px solid #eee;
      padding-top: 14px;
    }

    @media (max-width: 480px) {
      .container {
        margin: 20px;
        padding: 24px 18px;
      }
      .otp-box {
        font-size: 28px;
        letter-spacing: 6px;
        padding: 10px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">{{ brandName }}</div>

    <p class="message">
      Please use the following One-Time Password (OTP) to complete your verification:
    </p>

    <div class="otp-wrapper">
      <div class="otp-box">{{ otp }}</div>
    </div>

    <p class="note">
      This OTP is valid for <strong>{{ expiryTime }}</strong> minutes.<br />
      For your security, please do not share this code with anyone.
    </p>

    <div class="footer">
      &copy; {{ year }} {{ brandName }}. All rights reserved.
    </div>
  </div>
</body>
</html>
