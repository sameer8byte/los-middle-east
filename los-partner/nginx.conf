server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # ════════════════════════════════════════════════════
        # CONTENT SECURITY POLICY (CSP) HEADERS
        # Whitelist all Acefone domains and IPs
        # ════════════════════════════════════════════════════
        add_header Content-Security-Policy "
            default-src 'self';
            frame-src 'self' https://console.acefone.in https://*.acefone.in https://103.27.18.0/24;
            script-src 'self' 'unsafe-inline' 'unsafe-eval' https://console.acefone.in https://*.acefone.in https://api.acefone.in https://activecall.acefone.in https://dialer-api.acefone.in https://dialer-socket.acefone.in https://sip-bgn-wss.acefone.in https://sip-bgn-int.acefone.in https://103.27.18.0/24;
            style-src 'self' 'unsafe-inline' https://console.acefone.in https://*.acefone.in;
            img-src 'self' data: https: https://console.acefone.in https://*.acefone.in https://103.27.18.0/24;
            media-src 'self' https: https://console.acefone.in https://*.acefone.in https://103.27.18.0/24;
            connect-src 'self' https: https://console.acefone.in https://*.acefone.in https://api.acefone.in https://activecall.acefone.in https://dialer-api.acefone.in https://dialer-socket.acefone.in https://sip-bgn-wss.acefone.in https://sip-bgn-int.acefone.in wss://console.acefone.in wss://*.acefone.in wss://api.acefone.in wss://activecall.acefone.in wss://dialer-api.acefone.in wss://dialer-socket.acefone.in wss://sip-bgn-wss.acefone.in wss://sip-bgn-int.acefone.in https://103.27.18.0/24 wss://103.27.18.0/24;
            font-src 'self' data: https: https://console.acefone.in https://*.acefone.in;
            object-src 'none';
            base-uri 'self';
            form-action 'self' https://console.acefone.in https://*.acefone.in;
            frame-ancestors 'self';
            upgrade-insecure-requests;
        " always;
        
        # ════════════════════════════════════════════════════
        # CORS HEADERS
        # Allow Acefone domains for cross-origin requests
        # ════════════════════════════════════════════════════
        add_header Access-Control-Allow-Origin "https://console.acefone.in" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Allow-Credentials "true" always;
        
        # ════════════════════════════════════════════════════
        # FEATURE POLICY / PERMISSIONS POLICY
        # Allow microphone, camera, speaker, WebRTC for Acefone
        # ════════════════════════════════════════════════════
        add_header Permissions-Policy "
            microphone=(self 'https://console.acefone.in' 'https://*.acefone.in' 'https://api.acefone.in' 'https://activecall.acefone.in' 'https://dialer-socket.acefone.in' 'https://sip-bgn-wss.acefone.in'),
            camera=(self 'https://console.acefone.in' 'https://*.acefone.in' 'https://api.acefone.in' 'https://activecall.acefone.in' 'https://dialer-socket.acefone.in'),
            speaker=(self 'https://console.acefone.in' 'https://*.acefone.in' 'https://api.acefone.in' 'https://activecall.acefone.in' 'https://dialer-socket.acefone.in'),
            geolocation=(self),
            usb=(self 'https://console.acefone.in' 'https://*.acefone.in'),
            payment=(self)
        " always;
    }

    error_page 404 /index.html;
}
